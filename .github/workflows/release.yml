name: Release Module

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update module.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          jq --arg ver "$VERSION" \
             --arg url "https://github.com/TactiCool-HUN/sf2e-anachronism-automation/releases/download/$VERSION/module.zip" \
             '.version = $ver | .download = $url' \
             module.json > module.tmp.json && mv module.tmp.json module.json

      - name: Commit updated module.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "chore: update module.json to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:master

      - name: Zip module files
        run: |
          zip -r module.zip \
            artwork \
            packs \
            scripts \
            LICENSE \
            module.json \
            README.md \
            Settings.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          files: |
            module.zip
            module.json
          generate_release_notes: true

      - name: Publish to Foundry VTT
        run: |
          curl -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Content-Type: application/json" \
            -H "Authorization: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}" \
            -d '{
              "id": "sf2e-anachronism-automation",
              "release": {
                "version": "${{ steps.version.outputs.VERSION }}",
                "manifest": "https://github.com/TactiCool-HUN/sf2e-anachronism-automation/releases/latest/download/module.json",
                "notes": "https://github.com/TactiCool-HUN/sf2e-anachronism-automation/releases/tag/${{ github.ref_name }}",
                "compatibility": {
                  "minimum": "14",
                  "verified": "14"
                }
              }
            }'